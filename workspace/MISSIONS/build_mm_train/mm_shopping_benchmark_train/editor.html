<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM Shopping Benchmark Editor</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #151820;
    --card-bg: #1a1d27;
    --card-hover: #1e2233;
    --accent: #6c63ff;
    --accent-dim: rgba(108,99,255,0.15);
    --accent2: #00d4aa;
    --accent2-dim: rgba(0,212,170,0.12);
    --danger: #ff4757;
    --danger-dim: rgba(255,71,87,0.12);
    --warn: #ffa502;
    --warn-dim: rgba(255,165,2,0.12);
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --text-dim: #555a6e;
    --border: #2a2e3e;
    --border-light: #363b50;
    --tag-edit: #ff6b6b;
    --tag-gen: #4ecdc4;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #2a1a3e 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .header h1 {
    font-size: 1.3rem; font-weight: 700;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .header-stats {
    display: flex; gap: 16px; font-size: 0.78rem; color: var(--text-muted);
  }
  .header-stats .num { color: var(--accent2); font-weight: 700; }
  .header-actions {
    margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text); font-size: 0.8rem;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
    font-family: inherit;
  }
  .btn:hover { border-color: var(--accent); background: var(--card-hover); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-accent:hover { background: #5a52e0; }
  .btn-danger { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-warn { background: var(--warn-dim); border-color: var(--warn); color: var(--warn); }
  .btn-warn:hover { background: var(--warn); color: #fff; }
  .btn-sm { padding: 4px 8px; font-size: 0.72rem; }
  .btn-icon { padding: 4px 6px; font-size: 0.85rem; min-width: 28px; justify-content: center; }

  /* ── Toolbar / Filters ── */
  .toolbar {
    display: flex; gap: 10px; padding: 12px 24px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-wrap: wrap; align-items: center;
  }
  .filter-group { display: flex; flex-direction: column; gap: 3px; }
  .filter-group label {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-dim); font-weight: 600;
  }
  .filter-group select, .filter-group input[type="text"] {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 8px; font-size: 0.8rem; outline: none;
    min-width: 140px; font-family: inherit;
  }
  .filter-group select:focus, .filter-group input:focus {
    border-color: var(--accent);
  }
  .filter-group input[type="text"] { min-width: 220px; }
  .toolbar-right {
    margin-left: auto; display: flex; align-items: flex-end; gap: 8px;
  }
  .result-count { font-size: 0.8rem; color: var(--text-muted); }
  .result-count span { color: var(--accent2); font-weight: 700; }

  /* ── Selection bar ── */
  .selection-bar {
    display: none; padding: 8px 24px; background: var(--accent-dim);
    border-bottom: 1px solid var(--accent);
    align-items: center; gap: 12px; font-size: 0.82rem;
  }
  .selection-bar.active { display: flex; }
  .selection-bar .sel-count { color: var(--accent); font-weight: 700; }

  /* ── Content ── */
  .content { padding: 16px 24px; }

  /* ── Sample Card ── */
  .sample-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius-lg); margin-bottom: 14px;
    overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .sample-card:hover { border-color: var(--border-light); }
  .sample-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .sample-card.editing { border-color: var(--accent2); box-shadow: 0 0 0 1px var(--accent2); }

  .card-row {
    display: flex; align-items: stretch;
  }

  /* Checkbox column */
  .card-check {
    display: flex; align-items: center; justify-content: center;
    padding: 0 12px; border-right: 1px solid var(--border);
    cursor: pointer; min-width: 40px;
  }
  .card-check input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
  }

  /* Main content area */
  .card-main { flex: 1; min-width: 0; }

  /* Card header */
  .card-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .card-index {
    font-size: 0.7rem; font-weight: 700; color: var(--text-dim);
    background: var(--bg); border-radius: 4px; padding: 2px 8px;
    min-width: 36px; text-align: center;
  }
  .tag {
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.4px; padding: 2px 8px; border-radius: 12px;
    white-space: nowrap;
  }
  .tag-edit { background: rgba(255,107,107,0.15); color: var(--tag-edit); }
  .tag-gen { background: rgba(78,205,196,0.15); color: var(--tag-gen); }
  .tag-bench { background: var(--accent-dim); color: var(--accent); font-size: 0.65rem; }
  .card-task {
    font-size: 0.72rem; color: var(--text-dim); margin-left: auto;
    max-width: 350px; text-align: right; line-height: 1.2;
  }

  /* Card instruction (view mode) */
  .card-instruction {
    padding: 10px 14px; font-size: 0.92rem; line-height: 1.45;
    color: var(--text); background: rgba(108,99,255,0.03);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 8px;
  }
  .card-instruction .inst-text { flex: 1; }
  .card-instruction .inst-icon { font-size: 0.85rem; flex-shrink: 0; margin-top: 1px; }

  /* Card images (view mode) */
  .card-images {
    display: flex; gap: 8px; padding: 10px 14px;
    overflow-x: auto; align-items: flex-start;
  }
  .img-thumb {
    flex: 0 0 auto; position: relative; border-radius: 6px;
    overflow: hidden; border: 1px solid var(--border); background: #111;
    cursor: pointer; transition: transform 0.15s;
  }
  .img-thumb:hover { transform: scale(1.03); }
  .img-thumb img {
    display: block; height: 140px; width: auto; max-width: 200px;
    object-fit: contain; background: #111;
  }
  .img-thumb .img-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 16px 6px 4px; font-size: 0.58rem; color: #aaa;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .no-images {
    padding: 10px 14px; font-size: 0.78rem; color: var(--text-dim);
    font-style: italic;
  }

  /* Card actions */
  .card-actions {
    display: flex; align-items: center; justify-content: center;
    padding: 0 8px; gap: 4px; flex-direction: column;
    border-left: 1px solid var(--border);
    min-width: 44px;
  }

  /* ── Edit Panel (inline) ── */
  .edit-panel {
    display: none; padding: 14px; background: var(--bg2);
    border-top: 1px solid var(--accent2);
  }
  .sample-card.editing .edit-panel { display: block; }
  .sample-card.editing .card-instruction,
  .sample-card.editing .card-images,
  .sample-card.editing .no-images { display: none; }

  .edit-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 12px;
  }
  .edit-field { display: flex; flex-direction: column; gap: 3px; }
  .edit-field.full { grid-column: 1 / -1; }
  .edit-field label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.4px;
    color: var(--text-muted); font-weight: 600;
  }
  .edit-field input, .edit-field select, .edit-field textarea {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 7px 10px; font-size: 0.85rem;
    outline: none; font-family: inherit; resize: vertical;
  }
  .edit-field input:focus, .edit-field select:focus, .edit-field textarea:focus {
    border-color: var(--accent2);
  }
  .edit-field textarea { min-height: 60px; }

  /* Image editor */
  .img-editor { margin-top: 8px; }
  .img-editor-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.4px;
    color: var(--text-muted); font-weight: 600; margin-bottom: 6px;
  }
  .img-editor-list {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
  }
  .img-edit-item {
    position: relative; border-radius: 6px; overflow: hidden;
    border: 1px solid var(--border); background: #111;
  }
  .img-edit-item img {
    display: block; height: 100px; width: auto; max-width: 150px;
    object-fit: contain;
  }
  .img-edit-item .img-edit-actions {
    position: absolute; top: 2px; right: 2px;
    display: flex; gap: 2px;
  }
  .img-edit-item .img-edit-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8); padding: 2px 4px;
    font-size: 0.55rem; color: #aaa;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .img-edit-item .btn-remove-img {
    background: var(--danger); color: #fff; border: none;
    border-radius: 3px; width: 20px; height: 20px; font-size: 0.7rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .img-edit-item .btn-move-img {
    background: var(--card-bg); color: var(--text); border: none;
    border-radius: 3px; width: 20px; height: 20px; font-size: 0.65rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .img-add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .img-picker-input {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 8px; font-size: 0.8rem; outline: none;
    min-width: 300px; font-family: inherit;
  }
  .img-picker-input:focus { border-color: var(--accent2); }

  .edit-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    padding-top: 10px; border-top: 1px solid var(--border);
  }

  /* ── Image Picker Dropdown ── */
  .img-picker-wrapper { position: relative; }
  .img-picker-dropdown {
    display: none; position: absolute; top: 100%; left: 0;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 6px; max-height: 320px; overflow-y: auto;
    z-index: 300; width: 500px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .img-picker-dropdown.open { display: block; }
  .img-picker-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    cursor: pointer; border-bottom: 1px solid var(--border);
    font-size: 0.75rem; color: var(--text-muted);
  }
  .img-picker-item:hover { background: var(--card-hover); color: var(--text); }
  .img-picker-item img {
    width: 50px; height: 40px; object-fit: contain; border-radius: 3px;
    background: #111;
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92); z-index: 500;
    justify-content: center; align-items: center; cursor: zoom-out;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 90vh; object-fit: contain;
    border-radius: 8px; box-shadow: 0 0 60px rgba(108,99,255,0.3);
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 400;
    justify-content: center; align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px; min-width: 400px;
    max-width: 600px; max-height: 80vh; overflow-y: auto;
  }
  .modal h3 {
    font-size: 1.1rem; margin-bottom: 16px; color: var(--text);
  }
  .modal .edit-field { margin-bottom: 10px; }
  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;
    padding-top: 12px; border-top: 1px solid var(--border);
  }

  /* ── Toast ── */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 600;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    padding: 10px 18px; border-radius: 8px; font-size: 0.82rem;
    color: #fff; animation: toastIn 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast-success { background: #27ae60; }
  .toast-error { background: var(--danger); }
  .toast-info { background: var(--accent); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .edit-grid { grid-template-columns: 1fr; }
    .card-task { display: none; }
    .header, .toolbar, .content { padding-left: 12px; padding-right: 12px; }
  }

  /* ── Unsaved indicator ── */
  .unsaved-dot {
    display: none; width: 8px; height: 8px; border-radius: 50%;
    background: var(--warn); margin-left: 4px;
  }
  .unsaved-dot.active { display: inline-block; }

  /* ── Keyboard shortcut hints ── */
  kbd {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 5px; font-size: 0.65rem;
    color: var(--text-dim); font-family: monospace;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>🛒 Benchmark Editor</h1>
  <div class="header-stats" id="headerStats"></div>
  <div class="header-actions">
    <button class="btn" onclick="addNewSample()" title="Add new sample (Ctrl+N)">➕ Add Sample</button>
    <button class="btn btn-warn" onclick="exportCSV()" title="Download CSV">📥 Export CSV</button>
    <span class="unsaved-dot" id="unsavedDot" title="Unsaved changes"></span>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="filter-group">
    <label>Type</label>
    <select id="filterType"><option value="">All</option></select>
  </div>
  <div class="filter-group">
    <label>Benchmark</label>
    <select id="filterBenchmark"><option value="">All</option></select>
  </div>
  <div class="filter-group">
    <label>Task</label>
    <select id="filterTask"><option value="">All</option></select>
  </div>
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="filterSearch" placeholder="Search instructions...">
  </div>
  <div class="toolbar-right">
    <div class="result-count">Showing <span id="countDisplay">0</span> / <span id="totalDisplay">0</span></div>
  </div>
</div>

<!-- Selection bar -->
<div class="selection-bar" id="selectionBar">
  <span><span class="sel-count" id="selCount">0</span> selected</span>
  <button class="btn btn-sm" onclick="selectAll()">Select All Visible</button>
  <button class="btn btn-sm" onclick="clearSelection()">Clear</button>
  <button class="btn btn-sm btn-danger" onclick="deleteSelected()">🗑 Delete Selected</button>
</div>

<!-- Content -->
<div class="content" id="content"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="Preview">
</div>

<!-- Add/New Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 id="addModalTitle">Add New Sample</h3>
    <div class="edit-field">
      <label>Type</label>
      <select id="modalType">
        <option value="Edit">Edit</option>
        <option value="Generation">Generation</option>
      </select>
    </div>
    <div class="edit-field">
      <label>Benchmark</label>
      <input type="text" id="modalBenchmark" list="benchmarkList" placeholder="e.g. Virtual Try-On">
      <datalist id="benchmarkList"></datalist>
    </div>
    <div class="edit-field">
      <label>Task</label>
      <textarea id="modalTask" rows="2" placeholder="Task description"></textarea>
    </div>
    <div class="edit-field">
      <label>Instruction</label>
      <textarea id="modalInstruction" rows="3" placeholder="User instruction"></textarea>
    </div>
    <div class="edit-field">
      <label>Images (semicolon-separated filenames)</label>
      <textarea id="modalImages" rows="2" placeholder="image1.jpg; image2.jpg"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-accent" onclick="submitAddModal()">Add Sample</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API = '';
const IMAGE_DIR = 'images/';

// Parse Images field: supports both JSON array and semicolon-separated formats
function parseImages(raw) {
  if (!raw || !raw.trim()) return [];
  const s = raw.trim();
  if (s.startsWith('[')) {
    try { const arr = JSON.parse(s); return arr.map(x => x.trim()).filter(Boolean); } catch(e) {}
  }
  return s.split('; ').map(x => x.trim()).filter(Boolean);
}


let allSamples = [];
let allImages = [];
let filteredIndices = [];
let selectedSet = new Set();
let editingIdx = null;
let hasUnsaved = false;

// ── API Calls ──

async function fetchSamples() {
  const res = await fetch(`${API}/api/samples`);
  allSamples = await res.json();
  return allSamples;
}

async function fetchImages() {
  const res = await fetch(`${API}/api/images`);
  allImages = await res.json();
  return allImages;
}

async function apiUpdateSample(index, sample) {
  const res = await fetch(`${API}/api/samples/update`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({index, sample})
  });
  return res.json();
}

async function apiDeleteSamples(indices) {
  const res = await fetch(`${API}/api/samples/delete`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({indices})
  });
  return res.json();
}

async function apiAddSample(sample, insertAt) {
  const res = await fetch(`${API}/api/samples/add`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({sample, insertAt})
  });
  return res.json();
}

async function apiDuplicate(index) {
  const res = await fetch(`${API}/api/samples/duplicate`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({index})
  });
  return res.json();
}

async function apiReorder(from, to) {
  const res = await fetch(`${API}/api/samples/reorder`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({from, to})
  });
  return res.json();
}

// ── Init ──

async function init() {
  await Promise.all([fetchSamples(), fetchImages()]);
  initFilters();
  updateStats();
  render();
}

function initFilters() {
  const types = [...new Set(allSamples.map(d => d.Type))].sort();
  const benchmarks = [...new Set(allSamples.map(d => d.Benchmark))].sort();
  const tasks = [...new Set(allSamples.map(d => d.Task))].sort();

  fillSelect('filterType', types);
  fillSelect('filterBenchmark', benchmarks);
  fillSelect('filterTask', tasks, 80);

  // Also fill the modal datalist
  const dl = document.getElementById('benchmarkList');
  dl.innerHTML = '';
  benchmarks.forEach(b => { const o = document.createElement('option'); o.value = b; dl.appendChild(o); });

  ['filterType','filterBenchmark','filterTask'].forEach(id =>
    document.getElementById(id).addEventListener('change', render));
  document.getElementById('filterSearch').addEventListener('input', render);
}

function fillSelect(id, values, maxLen) {
  const sel = document.getElementById(id);
  // Keep first option (All)
  while (sel.options.length > 1) sel.remove(1);
  values.forEach(v => {
    const o = document.createElement('option');
    o.value = v;
    o.textContent = maxLen && v.length > maxLen ? v.slice(0, maxLen-3) + '...' : v;
    sel.appendChild(o);
  });
}

function updateStats() {
  const bar = document.getElementById('headerStats');
  const total = allSamples.length;
  const imgCount = allSamples.reduce((s, d) => s + parseImages(d.Images).length, 0);
  const benchCount = new Set(allSamples.map(d => d.Benchmark)).size;
  bar.innerHTML = `
    <span><span class="num">${total}</span> samples</span>
    <span><span class="num">${imgCount}</span> img refs</span>
    <span><span class="num">${benchCount}</span> benchmarks</span>
    <span><span class="num">${allImages.length}</span> image files</span>
  `;
  document.getElementById('totalDisplay').textContent = total;
}

// ── Filtering ──

function getFiltered() {
  const type = document.getElementById('filterType').value;
  const bench = document.getElementById('filterBenchmark').value;
  const task = document.getElementById('filterTask').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();

  filteredIndices = [];
  allSamples.forEach((d, i) => {
    if (type && d.Type !== type) return;
    if (bench && d.Benchmark !== bench) return;
    if (task && d.Task !== task) return;
    if (search && !d.Instruction.toLowerCase().includes(search)) return;
    filteredIndices.push(i);
  });
  return filteredIndices;
}

// ── Rendering ──

function render() {
  getFiltered();
  document.getElementById('countDisplay').textContent = filteredIndices.length;
  updateSelectionBar();

  const container = document.getElementById('content');
  const frag = document.createDocumentFragment();

  filteredIndices.forEach(dataIdx => {
    const row = allSamples[dataIdx];
    const card = document.createElement('div');
    card.className = 'sample-card' + (selectedSet.has(dataIdx) ? ' selected' : '') + (editingIdx === dataIdx ? ' editing' : '');
    card.id = `card-${dataIdx}`;

    const isEdit = row.Type === 'Edit';
    const images = parseImages(row.Images);

    card.innerHTML = `
      <div class="card-row">
        <div class="card-check" onclick="toggleSelect(${dataIdx}, event)">
          <input type="checkbox" ${selectedSet.has(dataIdx) ? 'checked' : ''} tabindex="-1">
        </div>
        <div class="card-main">
          <div class="card-header">
            <span class="card-index">#${dataIdx + 1}</span>
            <span class="tag ${isEdit ? 'tag-edit' : 'tag-gen'}">${esc(row.Type)}</span>
            <span class="tag tag-bench">${esc(row.Benchmark)}</span>
            <span class="card-task">${esc(row.Task)}</span>
          </div>
          <div class="card-instruction">
            <span class="inst-icon">💬</span>
            <span class="inst-text">${esc(row.Instruction)}</span>
          </div>
          ${images.length > 0 ? `
          <div class="card-images">
            ${images.map(img => `
              <div class="img-thumb" onclick="openLightbox('${IMAGE_DIR}${img}'); event.stopPropagation();">
                <img src="${IMAGE_DIR}${img}" alt="${esc(img)}" loading="lazy" onerror="this.parentElement.style.display='none'">
                <div class="img-label" title="${esc(img)}">${shortImgName(img)}</div>
              </div>
            `).join('')}
          </div>
          ` : '<div class="no-images">No images (generation task)</div>'}
          ${buildEditPanel(dataIdx, row, images)}
        </div>
        <div class="card-actions">
          <button class="btn btn-icon btn-sm" onclick="startEdit(${dataIdx})" title="Edit">✏️</button>
          <button class="btn btn-icon btn-sm" onclick="duplicateSample(${dataIdx})" title="Duplicate">📋</button>
          <button class="btn btn-icon btn-sm btn-danger" onclick="deleteSingle(${dataIdx})" title="Delete">🗑</button>
        </div>
      </div>
    `;
    frag.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(frag);

  // If editing, focus the instruction field
  if (editingIdx !== null) {
    const ta = document.getElementById(`edit-instruction-${editingIdx}`);
    if (ta) ta.focus();
  }
}

function buildEditPanel(dataIdx, row, images) {
  return `
    <div class="edit-panel" id="editPanel-${dataIdx}">
      <div class="edit-grid">
        <div class="edit-field">
          <label>Type</label>
          <select id="edit-type-${dataIdx}">
            <option value="Edit" ${row.Type === 'Edit' ? 'selected' : ''}>Edit</option>
            <option value="Generation" ${row.Type === 'Generation' ? 'selected' : ''}>Generation</option>
          </select>
        </div>
        <div class="edit-field">
          <label>Benchmark</label>
          <input type="text" id="edit-benchmark-${dataIdx}" value="${escAttr(row.Benchmark)}" list="benchmarkList">
        </div>
        <div class="edit-field full">
          <label>Task</label>
          <input type="text" id="edit-task-${dataIdx}" value="${escAttr(row.Task)}">
        </div>
        <div class="edit-field full">
          <label>Instruction</label>
          <textarea id="edit-instruction-${dataIdx}" rows="2">${esc(row.Instruction)}</textarea>
        </div>
      </div>
      <div class="img-editor">
        <div class="img-editor-label">Images (${images.length})</div>
        <div class="img-editor-list" id="imgList-${dataIdx}">
          ${images.map((img, imgIdx) => `
            <div class="img-edit-item" data-img="${escAttr(img)}">
              <img src="${IMAGE_DIR}${img}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2260%22><text x=%224%22 y=%2230%22 font-size=%2210%22 fill=%22%23666%22>missing</text></svg>'">
              <div class="img-edit-actions">
                ${imgIdx > 0 ? `<button class="btn-move-img" onclick="moveImage(${dataIdx}, ${imgIdx}, -1)" title="Move left">◀</button>` : ''}
                ${imgIdx < images.length - 1 ? `<button class="btn-move-img" onclick="moveImage(${dataIdx}, ${imgIdx}, 1)" title="Move right">▶</button>` : ''}
                <button class="btn-remove-img" onclick="removeImage(${dataIdx}, ${imgIdx})" title="Remove">✕</button>
              </div>
              <div class="img-edit-name" title="${escAttr(img)}">${shortImgName(img)}</div>
            </div>
          `).join('')}
        </div>
        <div class="img-add-row">
          <div class="img-picker-wrapper">
            <input type="text" class="img-picker-input" id="imgPicker-${dataIdx}"
              placeholder="Type to search images..." autocomplete="off"
              onfocus="openImagePicker(${dataIdx})" oninput="filterImagePicker(${dataIdx})">
            <div class="img-picker-dropdown" id="imgDropdown-${dataIdx}"></div>
          </div>
          <button class="btn btn-sm" onclick="addImageFromPicker(${dataIdx})">+ Add</button>
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn" onclick="cancelEdit()">Cancel <kbd>Esc</kbd></button>
        <button class="btn btn-accent" onclick="saveEdit(${dataIdx})">💾 Save <kbd>Ctrl+S</kbd></button>
      </div>
    </div>
  `;
}

// ── Edit Operations ──

function startEdit(idx) {
  editingIdx = idx;
  render();
}

function cancelEdit() {
  editingIdx = null;
  render();
}

async function saveEdit(idx) {
  const sample = {
    Type: document.getElementById(`edit-type-${idx}`).value,
    Benchmark: document.getElementById(`edit-benchmark-${idx}`).value.trim(),
    Task: document.getElementById(`edit-task-${idx}`).value.trim(),
    Instruction: document.getElementById(`edit-instruction-${idx}`).value.trim(),
    Images: getEditImages(idx).join('; ')
  };

  try {
    await apiUpdateSample(idx, sample);
    allSamples[idx] = sample;
    editingIdx = null;
    toast('Sample updated', 'success');
    updateStats();
    render();
  } catch (e) {
    toast('Failed to save: ' + e.message, 'error');
  }
}

function getEditImages(idx) {
  const list = document.getElementById(`imgList-${idx}`);
  if (!list) return [];
  return [...list.querySelectorAll('.img-edit-item')].map(el => el.dataset.img);
}

function removeImage(dataIdx, imgIdx) {
  const images = getEditImages(dataIdx);
  images.splice(imgIdx, 1);
  setEditImages(dataIdx, images);
}

function moveImage(dataIdx, imgIdx, dir) {
  const images = getEditImages(dataIdx);
  const newIdx = imgIdx + dir;
  if (newIdx < 0 || newIdx >= images.length) return;
  [images[imgIdx], images[newIdx]] = [images[newIdx], images[imgIdx]];
  setEditImages(dataIdx, images);
}

function setEditImages(dataIdx, images) {
  // Re-render just the image list
  const list = document.getElementById(`imgList-${dataIdx}`);
  list.innerHTML = images.map((img, imgIdx) => `
    <div class="img-edit-item" data-img="${escAttr(img)}">
      <img src="${IMAGE_DIR}${img}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2260%22><text x=%224%22 y=%2230%22 font-size=%2210%22 fill=%22%23666%22>missing</text></svg>'">
      <div class="img-edit-actions">
        ${imgIdx > 0 ? `<button class="btn-move-img" onclick="moveImage(${dataIdx}, ${imgIdx}, -1)" title="Move left">◀</button>` : ''}
        ${imgIdx < images.length - 1 ? `<button class="btn-move-img" onclick="moveImage(${dataIdx}, ${imgIdx}, 1)" title="Move right">▶</button>` : ''}
        <button class="btn-remove-img" onclick="removeImage(${dataIdx}, ${imgIdx})" title="Remove">✕</button>
      </div>
      <div class="img-edit-name" title="${escAttr(img)}">${shortImgName(img)}</div>
    </div>
  `).join('');
  // Update label
  const label = list.parentElement.querySelector('.img-editor-label');
  if (label) label.textContent = `Images (${images.length})`;
}

// ── Image Picker ──

function openImagePicker(dataIdx) {
  filterImagePicker(dataIdx);
  document.getElementById(`imgDropdown-${dataIdx}`).classList.add('open');
}

function filterImagePicker(dataIdx) {
  const input = document.getElementById(`imgPicker-${dataIdx}`);
  const dropdown = document.getElementById(`imgDropdown-${dataIdx}`);
  const query = input.value.toLowerCase();
  const currentImages = new Set(getEditImages(dataIdx));

  const matches = allImages.filter(img =>
    img.toLowerCase().includes(query) && !currentImages.has(img)
  ).slice(0, 50);

  dropdown.innerHTML = matches.map(img => `
    <div class="img-picker-item" onclick="pickImage(${dataIdx}, '${escAttr(img)}')">
      <img src="${IMAGE_DIR}${img}" loading="lazy" onerror="this.style.display='none'">
      <span>${esc(img)}</span>
    </div>
  `).join('');

  if (matches.length === 0) {
    dropdown.innerHTML = '<div style="padding:12px;color:var(--text-dim);font-size:0.8rem;">No matching images</div>';
  }
}

function pickImage(dataIdx, imgName) {
  const images = getEditImages(dataIdx);
  images.push(imgName);
  setEditImages(dataIdx, images);
  document.getElementById(`imgPicker-${dataIdx}`).value = '';
  document.getElementById(`imgDropdown-${dataIdx}`).classList.remove('open');
}

function addImageFromPicker(dataIdx) {
  const input = document.getElementById(`imgPicker-${dataIdx}`);
  const val = input.value.trim();
  if (!val) return;
  const images = getEditImages(dataIdx);
  images.push(val);
  setEditImages(dataIdx, images);
  input.value = '';
}

// Close dropdowns on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.img-picker-wrapper')) {
    document.querySelectorAll('.img-picker-dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

// ── Selection ──

function toggleSelect(idx, e) {
  e.stopPropagation();
  if (selectedSet.has(idx)) selectedSet.delete(idx);
  else selectedSet.add(idx);
  render();
}

function selectAll() {
  filteredIndices.forEach(i => selectedSet.add(i));
  render();
}

function clearSelection() {
  selectedSet.clear();
  render();
}

function updateSelectionBar() {
  const bar = document.getElementById('selectionBar');
  const count = selectedSet.size;
  document.getElementById('selCount').textContent = count;
  bar.classList.toggle('active', count > 0);
}

// ── Delete ──

async function deleteSingle(idx) {
  if (!confirm(`Delete sample #${idx + 1}?\n\n"${allSamples[idx].Instruction.slice(0, 80)}..."`)) return;
  try {
    await apiDeleteSamples([idx]);
    toast('Sample deleted', 'success');
    editingIdx = null;
    selectedSet.delete(idx);
    await fetchSamples();
    // Remap selection indices
    selectedSet = new Set([...selectedSet].filter(i => i < allSamples.length));
    initFilters();
    updateStats();
    render();
  } catch (e) {
    toast('Delete failed: ' + e.message, 'error');
  }
}

async function deleteSelected() {
  const indices = [...selectedSet].sort((a, b) => a - b);
  if (!confirm(`Delete ${indices.length} selected samples?`)) return;
  try {
    await apiDeleteSamples(indices);
    toast(`${indices.length} samples deleted`, 'success');
    editingIdx = null;
    selectedSet.clear();
    await fetchSamples();
    initFilters();
    updateStats();
    render();
  } catch (e) {
    toast('Delete failed: ' + e.message, 'error');
  }
}

// ── Duplicate ──

async function duplicateSample(idx) {
  try {
    await apiDuplicate(idx);
    toast('Sample duplicated', 'success');
    await fetchSamples();
    updateStats();
    render();
  } catch (e) {
    toast('Duplicate failed: ' + e.message, 'error');
  }
}

// ── Add New ──

function addNewSample() {
  document.getElementById('addModalTitle').textContent = 'Add New Sample';
  document.getElementById('modalType').value = 'Edit';
  document.getElementById('modalBenchmark').value = '';
  document.getElementById('modalTask').value = '';
  document.getElementById('modalInstruction').value = '';
  document.getElementById('modalImages').value = '';
  document.getElementById('addModal').classList.add('active');
  document.getElementById('modalInstruction').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

async function submitAddModal() {
  const sample = {
    Type: document.getElementById('modalType').value,
    Benchmark: document.getElementById('modalBenchmark').value.trim(),
    Task: document.getElementById('modalTask').value.trim(),
    Instruction: document.getElementById('modalInstruction').value.trim(),
    Images: document.getElementById('modalImages').value.trim()
  };
  if (!sample.Instruction) {
    toast('Instruction is required', 'error');
    return;
  }
  try {
    await apiAddSample(sample);
    toast('Sample added', 'success');
    closeAddModal();
    await fetchSamples();
    initFilters();
    updateStats();
    render();
    // Scroll to bottom
    window.scrollTo(0, document.body.scrollHeight);
  } catch (e) {
    toast('Add failed: ' + e.message, 'error');
  }
}

// ── Export ──

function exportCSV() {
  const rows = [FIELDNAMES.join(',')];
  allSamples.forEach(s => {
    rows.push(FIELDNAMES.map(f => {
      const v = s[f] || '';
      if (v.includes(',') || v.includes('"') || v.includes('\n')) {
        return '"' + v.replace(/"/g, '""') + '"';
      }
      return v;
    }).join(','));
  });
  const blob = new Blob([rows.join('\n')], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'samples.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('CSV exported', 'info');
}

const FIELDNAMES = ['Type', 'Benchmark', 'Task', 'Instruction', 'Images'];

// ── Lightbox ──

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

// ── Toast ──

function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}

// ── Helpers ──

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function escAttr(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function shortImgName(name) {
  const n = name.replace('.jpg','').replace('.png','');
  return n.length > 35 ? n.slice(0, 32) + '...' : n;
}

// ── Keyboard Shortcuts ──

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('active')) {
      closeLightbox();
    } else if (document.getElementById('addModal').classList.contains('active')) {
      closeAddModal();
    } else if (editingIdx !== null) {
      cancelEdit();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (editingIdx !== null) saveEdit(editingIdx);
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    addNewSample();
  }
});

// ── Start ──
init();
</script>
</body>
