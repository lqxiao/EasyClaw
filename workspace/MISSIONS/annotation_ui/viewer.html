<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM Shopping Benchmark Viewer</title>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --card-hover: #22263a;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --border: #2a2e3e;
    --tag-edit: #ff6b6b;
    --tag-gen: #4ecdc4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #2a1a3e 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .header .subtitle {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .stat-item .num {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent2);
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 12px;
    padding: 16px 32px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .filter-group label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .filter-group select, .filter-group input {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.85rem;
    outline: none;
    min-width: 160px;
  }
  .filter-group select:focus, .filter-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(108,99,255,0.2);
  }
  .filter-group input {
    min-width: 240px;
  }
  .result-count {
    margin-left: auto;
    font-size: 0.85rem;
    color: var(--text-muted);
    align-self: flex-end;
    padding-bottom: 6px;
  }
  .result-count span {
    color: var(--accent2);
    font-weight: 700;
  }

  /* Main content */
  .content {
    padding: 24px 32px;
  }

  /* Sample card */
  .sample-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .sample-card:hover {
    border-color: var(--accent);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .card-index {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    background: var(--bg);
    border-radius: 6px;
    padding: 4px 10px;
    min-width: 40px;
    text-align: center;
  }
  .tag {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .tag-edit {
    background: rgba(255,107,107,0.15);
    color: var(--tag-edit);
  }
  .tag-gen {
    background: rgba(78,205,196,0.15);
    color: var(--tag-gen);
  }
  .tag-benchmark {
    background: rgba(108,99,255,0.15);
    color: var(--accent);
    font-weight: 600;
    font-size: 0.72rem;
  }
  .card-task {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-left: auto;
    max-width: 400px;
    text-align: right;
    line-height: 1.3;
  }

  /* Instruction */
  .card-instruction {
    padding: 14px 20px;
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    background: rgba(108,99,255,0.04);
    border-bottom: 1px solid var(--border);
  }
  .card-instruction::before {
    content: '💬 ';
  }

  /* Images row */
  .card-images {
    display: flex;
    gap: 12px;
    padding: 16px 20px;
    overflow-x: auto;
    align-items: flex-start;
  }
  .img-wrapper {
    flex: 0 0 auto;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #111;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .img-wrapper:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  }
  .img-wrapper img {
    display: block;
    height: 220px;
    width: auto;
    max-width: 300px;
    object-fit: contain;
    background: #111;
  }
  .img-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 24px 8px 6px;
    font-size: 0.65rem;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
  }
  .lightbox.active {
    display: flex;
  }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(108,99,255,0.3);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  /* Responsive */
  @media (max-width: 768px) {
    .header, .filters, .content { padding-left: 16px; padding-right: 16px; }
    .card-task { display: none; }
    .img-wrapper img { height: 160px; }
  }
</style>
</head>

// Parse CSV (handles commas in fields properly)
function parseCSV(text) {
  const lines = text.split('\n');
  const headers = parseCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const values = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, idx) => obj[h.trim()] = (values[idx] || '').trim());
    rows.push(obj);
  }
  return rows;
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { result.push(current); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

initFilters();
updateStats();

function initFilters() {
  const types = [...new Set(allData.map(d => d.Type))].sort();
  const benchmarks = [...new Set(allData.map(d => d.Benchmark))].sort();
  const tasks = [...new Set(allData.map(d => d.Task))].sort();

  const typeSelect = document.getElementById('filterType');
  types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; typeSelect.appendChild(o); });

  const benchSelect = document.getElementById('filterBenchmark');
  benchmarks.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; benchSelect.appendChild(o); });

  const taskSelect = document.getElementById('filterTask');
  tasks.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t.length > 80 ? t.slice(0,77)+'...' : t; taskSelect.appendChild(o); });

  typeSelect.addEventListener('change', render);
  benchSelect.addEventListener('change', render);
  taskSelect.addEventListener('change', render);
  document.getElementById('filterSearch').addEventListener('input', render);
}

function updateStats() {
  const bar = document.getElementById('statsBar');
  const totalSamples = allData.length;
  const totalImages = allData.reduce((s, d) => s + d.Images.split('; ').length, 0);
  const benchmarks = new Set(allData.map(d => d.Benchmark)).size;
  const tasks = new Set(allData.map(d => d.Task)).size;
  bar.innerHTML = `
    <div class="stat-item"><span class="num">${totalSamples}</span> Samples</div>
    <div class="stat-item"><span class="num">${totalImages}</span> Image Refs</div>
    <div class="stat-item"><span class="num">${benchmarks}</span> Benchmarks</div>
    <div class="stat-item"><span class="num">${tasks}</span> Tasks</div>
  `;
}

function getFiltered() {
  const type = document.getElementById('filterType').value;
  const bench = document.getElementById('filterBenchmark').value;
  const task = document.getElementById('filterTask').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();

  return allData.filter(d => {
    if (type && d.Type !== type) return false;
    if (bench && d.Benchmark !== bench) return false;
    if (task && d.Task !== task) return false;
    if (search && !d.Instruction.toLowerCase().includes(search)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('countDisplay').textContent = filtered.length;
  const container = document.getElementById('content');

  // Render in batches for performance
  container.innerHTML = '';
  const fragment = document.createDocumentFragment();

  filtered.forEach((row, idx) => {
    const card = document.createElement('div');
    card.className = 'sample-card';

    const isEdit = row.Type === 'Edit';
    const images = row.Images.split('; ').map(s => s.trim()).filter(Boolean);

    card.innerHTML = `
      <div class="card-header">
        <span class="card-index">#${idx + 1}</span>
        <span class="tag ${isEdit ? 'tag-edit' : 'tag-gen'}">${row.Type}</span>
        <span class="tag tag-benchmark">${row.Benchmark}</span>
        <span class="card-task">${row.Task}</span>
      </div>
      <div class="card-instruction">${escapeHtml(row.Instruction)}</div>
      <div class="card-images">
        ${images.map(img => `
          <div class="img-wrapper" onclick="openLightbox('${IMAGE_DIR}${img}')">
            <img src="${IMAGE_DIR}${img}" alt="${img}" loading="lazy" onerror="this.parentElement.style.display='none'">
            <div class="img-label" title="${img}">${formatImgName(img)}</div>
          </div>
        `).join('')}
      </div>
    `;
    fragment.appendChild(card);
  });

  container.appendChild(fragment);
}

function formatImgName(name) {
  // Extract category and short name
  const parts = name.replace('.jpg','').split('_');
  const category = parts[0];
  const idx = parts[1];
  const rest = parts.slice(2).join(' ').replace(/Sponsored Ad - /g, '');
  return `[${category} ${idx}] ${rest.length > 40 ? rest.slice(0,37)+'...' : rest}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  lb.classList.add('active');
  event.stopPropagation();
}

// Close lightbox on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});
</script>
